<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş Bilgi Üssü & Radyo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #d4af37;
            --bg: #0f0f0f;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* RADYO PANELİ - EN ÜSTTE VE GÖRÜNÜR */
        .radio-panel {
            background: var(--primary);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .live-indicator {
            color: #e74c3c;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
        }
        audio { width: 100%; margin-top: 20px; filter: invert(100%) brightness(1.5); }

        /* GRAFİK ALANI */
        .chart-section { background: #121212; border-radius: 20px; padding: 20px; margin-bottom: 30px; height: 250px; }

        /* KÜTÜPHANE */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .book-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            transition: 0.3s;
        }
        .book-card:hover { transform: translateY(-5px); background: #252525; }
        .icon { font-size: 24px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <!-- RADYO MERKEZİ -->
    <div class="radio-panel">
        <span class="live-indicator">● CANLI YAYIN</span>
        <h2 style="margin: 0; color: var(--accent);">Dünya Müziği Frekansı</h2>
        <p style="color: #888; font-size: 14px;">Kaş için seçilmiş global tınılar</p>
        <audio controls autoplay>
            <source src="https://icecast.radiofrance.fr/fip-midfi.mp3" type="audio/mpeg">
            Tarayıcınız radyoyu desteklemiyor.
        </audio>
    </div>

    <!-- HAVA DURUMU ANALİZİ -->
    <div class="chart-section">
        <canvas id="weatherChart"></canvas>
    </div>

    <!-- KİTAPLIK -->
    <div class="library-grid">
        <a href="frekanslar.pdf" class="book-card">
            <span class="icon">📡</span> Frekans Analizleri
        </a>
        <a href="bonsai_teknikleri.pdf" class="book-card">
            <span class="icon">🌳</span> Bonsai Teknikleri
        </a>
        <a href="mimari_cizim.pdf" class="book-card">
            <span class="icon">📐</span> Mimari Çizimler
        </a>
        <a href="python_notlar.pdf" class="book-card">
            <span class="icon">🐍</span> Python Notları
        </a>
    </div>
</div>

<script>
    fetch('results.json')
        .then(res => res.json())
        .then(data => {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.nokta),
                    datasets: [{
                        label: 'Sıcaklık Verileri',
                        data: data.map(d => d.deger),
                        borderColor: '#d4af37',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(212, 175, 55, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: '#555' } },
                        y: { grid: { color: '#222' }, ticks: { color: '#555' } }
                    }
                }
            });
        });
</script>

</body>
</html>
