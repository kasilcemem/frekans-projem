<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Canlı Hava İstasyonu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e0f2f1; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #00796b; }
        .chart-container { height: 300px; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #009688; color: white; }
        .temp-val { font-weight: bold; color: #d84315; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☀️ Canlı Hava Analiz Paneli</h1>
        <div class="chart-container"><canvas id="weatherChart"></canvas></div>
        <div id="table-area"></div>
    </div>

    <script>
        fetch('results.json')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('weatherChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.nokta),
                        datasets: [{
                            label: 'Ortalama Sıcaklık (°C)',
                            data: data.map(d => d.deger),
                            borderColor: '#ff5722',
                            backgroundColor: 'rgba(255, 87, 34, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

                let html = '<table><tr><th>Tarih</th><th>Ort. Sıcaklık</th><th>Maks. Sıcaklık</th><th>Detay</th></tr>';
                data.forEach(d => {
                    html += `<tr>
                        <td>${d.nokta}</td>
                        <td class="temp-val">${d.deger}°C</td>
                        <td>${d.degisim}°C</td>
                        <td>${d.durum}</td>
                    </tr>`;
                });
                document.getElementById('table-area').innerHTML = html + '</table>';
            });
    </script>
</body>
</html>
