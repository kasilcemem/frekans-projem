<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş Bağımsız Sinema Odası</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000;
            --gold: #c5a059;
            --panel: #111;
        }
        body { font-family: 'Times New Roman', serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        
        /* DEV VİDEO DUVARI */
        .video-wall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 5px;
            background: #000;
        }
        .movie-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 1px solid #111;
        }
        .movie-item iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 120%; height: 120%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* Üzerine tıklamayı engelle, sadece izle */
        }
        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px;
            opacity: 0;
            transition: 0.5s;
        }
        .movie-item:hover .overlay { opacity: 1; }
        .movie-title { font-size: 1.2rem; color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* KONTROL MERKEZİ (ALT ŞERİT) */
        .dashboard {
            background: var(--panel);
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 30px;
            align-items: center;
            border-top: 1px solid #222;
        }
        .radio-player { text-align: center; }
        audio { width: 100%; filter: invert(1); opacity: 0.4; }
        
        .book-shelf { display: flex; flex-direction: column; gap: 8px; }
        .book-link { color: #666; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .book-link:hover { color: var(--gold); }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .video-wall { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- VİDEO DUVARI: AÇILDIĞI GİBİ OYNAYAN SİNEMATİK SEÇKİ -->
<div class="video-wall">
    <!-- Tarkovsky - The Mirror -->
    <div class="movie-item">
        <iframe src="https://www.youtube.com/embed/H079K-s_6zM?autoplay=1&mute=1&controls=0&loop=1&playlist=H079K-s_6zM" allow="autoplay"></iframe>
        <div class="overlay"><p class="movie-title">The Mirror (1975)</p></div>
    </div>
    <!-- Tarsem Singh - The Fall -->
    <div class="movie-item">
        <iframe src="https://www.youtube.com/embed/S_T09p_U6pM?autoplay=1&mute=1&controls=0&loop=1&playlist=S_T09p_U6pM" allow="autoplay"></iframe>
        <div class="overlay"><p class="movie-title">The Fall (2006)</p></div>
    </div>
    <!-- Loving Vincent -->
    <div class="movie-item">
        <iframe src="https://www.youtube.com/embed/v9S_m8P8YvU?autoplay=1&mute=1&controls=0&loop=1&playlist=v9S_m8P8YvU" allow="autoplay"></iframe>
        <div class="overlay"><p class="movie-title">Loving Vincent (2017)</p></div>
    </div>
    <!-- Samsara -->
    <div class="movie-item">
        <iframe src="https://www.youtube.com/embed/n9u6TOn6i6Y?autoplay=1&mute=1&controls=0&loop=1&playlist=n9u6TOn6i6Y" allow="autoplay"></iframe>
        <div class="overlay"><p class="movie-title">Samsara (2011)</p></div>
    </div>
</div>

<div class="dashboard">
    <!-- ANALİZ -->
    <div style="height: 150px;">
        <canvas id="weatherChart"></canvas>
    </div>

    <!-- RADYO -->
    <div class="radio-player">
        <p style="color: var(--gold); letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 10px;">DÜNYA MÜZİĞİ RADYOSU</p>
        <audio controls autoplay>
            <source src="https://icecast.radiofrance.fr/fip-midfi.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- KİTAPLIK -->
    <div class="book-shelf">
        <p style="color: var(--gold); font-size: 0.8rem; letter-spacing: 2px;">KÜTÜPHANE</p>
        <a href="frekanslar.pdf" class="book-link">📡 Frekans Verileri</a>
        <a href="bonsai_teknikleri.pdf" class="book-link">🌳 Bonsai Sanatı</a>
        <a href="mimari_cizim.pdf" class="book-link">📐 Mimari Eskizler</a>
    </div>
</div>

<script>
    // Hava durumu grafiği
    fetch('results.json')
        .then(res => res.json())
        .then(data => {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.nokta),
                    datasets: [{
                        data: data.map(d => d.deger),
                        borderColor: '#c5a059',
                        borderWidth: 1,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { ticks: { color: '#333' }, grid: { display: false } },
                        y: { ticks: { display: false }, grid: { color: '#1a1a1a' } }
                    }
                }
            });
        });
</script>

</body>
</html>
