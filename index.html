<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş Analiz & Bilgi Üssü</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        h1, h2 { text-align: center; color: var(--primary); }

        /* RADYO BÖLÜMÜ */
        .radio-box {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin: 20px 0 40px 0;
            border-bottom: 5px solid var(--accent);
        }
        .live-tag {
            background: #e74c3c;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        audio { width: 100%; margin-top: 15px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        /* GRAFİK */
        .chart-container { height: 300px; margin-bottom: 50px; }

        /* KÜTÜPHANE */
        .shelf { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        .book { 
            background: #ecf0f1; 
            color: var(--primary); 
            padding: 25px; 
            border-radius: 10px 20px 20px 10px; 
            text-decoration: none; 
            font-weight: bold;
            text-align: center;
            border-left: 10px solid var(--accent);
            transition: 0.3s;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
        }
        .book:hover { transform: translateY(-10px); background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📍 Kaş Kontrol Merkezi</h1>

    <!-- 1. BÖLÜM: ANALİZ GRAFİĞİ -->
    <div class="chart-container">
        <canvas id="weatherChart"></canvas>
    </div>

    <!-- 2. BÖLÜM: DÜNYA MÜZİĞİ RADYOSU -->
    <div class="radio-box">
        <span class="live-tag">CANLI</span>
        <h3 style="margin: 10px 0;">Dünya Müziği Frekansı (FIP)</h3>
        <p style="font-size: 13px; color: #bdc3c7;">Kaş'ta huzurlu bir çalışma için global seçkiler.</p>
        <audio controls>
            <source src="https://icecast.radiofrance.fr/fip-midfi.mp3" type="audio/mpeg">
            Tarayıcınız radyoyu desteklemiyor.
        </audio>
    </div>

    <!-- 3. BÖLÜM: PDF KÜTÜPHANESİ -->
    <div class="library-section">
        <h2>📚 Kitaplık</h2>
        <div class="shelf">
            <a href="frekanslar.pdf" class="book">📡<br>Frekanslar</a>
            <a href="bonsai_teknikleri.pdf" class="book" style="border-left-color: #27ae60;">🌳<br>Bonsai Teknikleri</a>
            <a href="mimari_cizim.pdf" class="book" style="border-left-color: #e67e22;">📐<br>Mimari Çizim</a>
            <a href="python_notlar.pdf" class="book" style="border-left-color: #9b59b6;">🐍<br>Python Notları</a>
        </div>
    </div>
</div>

<script>
    // Verileri JSON'dan çekip grafiğe basan motor
    fetch('results.json')
        .then(res => res.json())
        .then(data => {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.nokta),
                    datasets: [{
                        label: 'Sıcaklık (°C)',
                        data: data.map(d => d.deger),
                        backgroundColor: '#3498db',
                        borderRadius: 10,
                        barThickness: 40
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false, grid: { display: false } }, x: { grid: { display: false } } }
                }
            });
        });
</script>

</body>
</html>
