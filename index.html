<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Antalya İlçe Analizi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff5e6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #d35400; }
        .chart-container { height: 400px; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #e67e22; color: white; }
        .temp-box { font-size: 20px; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Antalya Bölgesel Isı Haritası</h1>
        <div class="chart-container"><canvas id="weatherChart"></canvas></div>
        <div id="table-area"></div>
    </div>

    <script>
        fetch('results.json')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('weatherChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar', // Sütun grafik
                    data: {
                        labels: data.map(d => d.nokta),
                        datasets: [{
                            label: 'Anlık Sıcaklık (°C)',
                            data: data.map(d => d.deger),
                            backgroundColor: ['#ff9f43', '#ee5253', '#10ac84', '#54a0ff'],
                            borderRadius: 10
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: false } }
                    }
                });

                let html = '<table><tr><th>İlçe</th><th>Sıcaklık</th><th>Detay</th></tr>';
                data.forEach(d => {
                    html += `<tr>
                        <td><strong>${d.nokta}</strong></td>
                        <td class="temp-box">${d.deger}°C</td>
                        <td>${d.durum}</td>
                    </tr>`;
                });
                document.getElementById('table-area').innerHTML = html + '</table>';
            });
    </script>
</body>
</html>
