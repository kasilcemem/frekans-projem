<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş AI Sinema & Bilgi Üssü</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #080808; --gold: #d4af37; --panel: #121212; --text: #e0e0e0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        /* AKILLI SİNEMA MOTORU */
        .ai-search-box {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid #333; border-radius: 20px; padding: 30px;
            text-align: center; margin-bottom: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .search-input {
            width: 70%; padding: 15px; border-radius: 30px; border: 1px solid #444;
            background: #000; color: var(--gold); font-size: 16px; outline: none; margin-bottom: 20px;
        }
        .ai-btn {
            background: var(--gold); color: #000; border: none; padding: 12px 25px;
            border-radius: 25px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s;
        }
        .ai-btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* RADYO VE ANALİZ ŞERİDİ */
        .dashboard-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .card { background: var(--panel); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        audio { width: 100%; filter: invert(1); opacity: 0.5; margin-top: 15px; }

        /* KÜTÜPHANE VE TEKNİK VERİ */
        .tech-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .tech-link {
            background: #1a1a1a; padding: 20px; border-radius: 12px; text-decoration: none;
            color: var(--text); text-align: center; border-bottom: 3px solid var(--gold); transition: 0.3s;
        }
        .tech-link:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. AKILLI SİNEMA TARAYICI (AI HUB) -->
    <div class="ai-search-box">
        <h2 style="color: var(--gold); letter-spacing: 2px;">AI SİNEMA PORTALI</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Dünya müziği eşliğinde bağımsız film kütüphanelerini tara.</p>
        <input type="text" id="movieSearch" class="search-input" placeholder="Film, yönetmen veya tür yazın...">
        <div class="button-group">
            <button class="ai-btn" onclick="searchMovie('mubi')">MUBI Tara</button>
            <button class="ai-btn" onclick="searchMovie('criterion')">Criterion Collection</button>
            <button class="ai-btn" onclick="searchMovie('imdb')">IMDb Entelektüel</button>
        </div>
    </div>

    <!-- 2. RADYO VE ANALİZ -->
    <div class="dashboard-row">
        <div class="card">
            <span style="color: var(--gold); font-size: 12px; letter-spacing: 2px;">📻 CANLI YAYIN</span>
            <audio controls autoplay><source src="https://icecast.radiofrance.fr/fip-midfi.mp3" type="audio/mpeg"></audio>
        </div>
        <div class="card" style="height: 120px;">
            <canvas id="weatherChart"></canvas>
        </div>
    </div>

    <!-- 3. TEKNİK KÜTÜPHANE -->
    <div class="tech-grid">
        <a href="frekanslar.pdf" class="tech-link">📡 Frekans Analizleri</a>
        <a href="bonsai_teknikleri.pdf" class="tech-link">🌳 Bonsai Stil Rehberi</a>
        <a href="mimari_cizim.pdf" class="tech-link">📐 Mimari Projeler</a>
        <a href="python_notlar.pdf" class="tech-link">🐍 Python Notları</a>
    </div>
</div>

<script>
    // Akıllı Arama Fonksiyonu
    function searchMovie(platform) {
        const query = document.getElementById('movieSearch').value;
        let url = '';
        if(platform === 'mubi') url = `https://mubi.com/tr/search/films?query=${query}`;
        if(platform === 'criterion') url = `https://www.criterion.com/search#stq=${query}`;
        if(platform === 'imdb') url = `https://www.imdb.com/find?q=${query}&s=tt&ttype=ft`;
        
        if(query) window.open(url, '_blank');
        else alert('Lütfen önce bir film ismi girin.');
    }

    // Isı Analiz Grafiği
    fetch('results.json').then(res => res.json()).then(data => {
        const ctx = document.getElementById('weatherChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.nokta),
                datasets: [{
                    data: data.map(d => d.deger),
                    borderColor: '#d4af37',
                    borderWidth: 1,
                    pointRadius: 0,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(212, 175, 55, 0.05)'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });
    });
</script>

</body>
</html>
