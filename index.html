<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş Bağımsız Sinema Galerisi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #050505; --gold: #c5a059; --panel: #111; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        
        /* SİNEMATİK VİDEO IZGARASI */
        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 10px;
            padding: 10px;
        }
        .movie-card {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
            overflow: hidden;
            border: 1px solid #222;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: 0.5s;
        }
        .movie-card:hover video { opacity: 1; transform: scale(1.05); }
        .label {
            position: absolute;
            bottom: 15px; left: 15px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 1px;
            border-left: 3px solid var(--gold);
        }

        /* ALT DASHBOARD */
        .bottom-bar {
            background: var(--panel);
            padding: 25px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 30px;
            border-top: 1px solid #333;
            align-items: center;
        }
        .radio-info { text-align: center; }
        audio { width: 100%; filter: invert(1); opacity: 0.5; }
        .links a { display: block; color: #888; text-decoration: none; margin-bottom: 5px; font-size: 13px; }
        .links a:hover { color: var(--gold); }
    </style>
</head>
<body>

<div class="video-container">
    <!-- Otomatik Oynayan Yüksek Kaliteli Sinematik Döngüler -->
    <div class="movie-card">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-night-sky-11604-large.mp4" type="video/mp4">
        </video>
        <div class="label">KOZMİK ESTETİK</div>
    </div>
    <div class="movie-card">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-the-sunlight-529-large.mp4" type="video/mp4">
        </video>
        <div class="label">DOĞA VE ŞİİR</div>
    </div>
    <div class="movie-card">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-waves-in-the-water-1164-large.mp4" type="video/mp4">
        </video>
        <div class="label">AKDENİZ RİTMİ</div>
    </div>
    <div class="movie-card">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-fireworks-in-the-night-sky-10522-large.mp4" type="video/mp4">
        </video>
        <div class="label">IŞIK VE FORM</div>
    </div>
</div>

<div class="bottom-bar">
    <div style="height: 120px;"><canvas id="weatherChart"></canvas></div>

    <div class="radio-info">
        <p style="margin:0; font-size: 11px; color: var(--gold); letter-spacing: 2px;">DÜNYA MÜZİĞİ AKTİF</p>
        <audio controls autoplay>
            <source src="https://icecast.radiofrance.fr/fip-midfi.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="links">
        <p style="color: var(--gold); font-size: 11px; margin-bottom: 10px;">KÜTÜPHANE</p>
        <a href="frekanslar.pdf">📡 Frekanslar</a>
        <a href="bonsai_teknikleri.pdf">🌳 Bonsai</a>
        <a href="mimari_cizim.pdf">📐 Mimari</a>
    </div>
</div>

<script>
    fetch('results.json')
        .then(res => res.json())
        .then(data => {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.nokta),
                    datasets: [{
                        data: data.map(d => d.deger),
                        borderColor: '#c5a059',
                        borderWidth: 1,
                        pointRadius: 0,
                        tension: 0.5,
                        fill: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false },
                        y: { display: false }
                    }
                }
            });
        });
</script>

</body>
</html>
