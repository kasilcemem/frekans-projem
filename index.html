<!-- Mevcut kodundaki <script> içindeki askAI fonksiyonunu bununla değiştir -->
<script>
    const aiHafiza = {
        bonsai: ["Kaş'ın nem oranı bonsai teli için metali genleştirebilir, dikkat et.", "Sıralı kesimler (sıralı kesimler) için şu anki sıcaklık grafiği uygun görünüyor.", "Fidan eğitiminde wiring (tel çekme) yaparken ağacın nefes almasına izin ver."],
        mimari: ["Çatıyı yükseltme fikrin, ısı yalıtımı için avantaj sağlayabilir.", "Merdiven tasarımlarında kot farkını grafikteki verilere göre optimize edelim.", "Görselleştirmede ışık açısını Kaş'ın iklim verilerine göre ayarlıyorum."],
        frekans: ["Frekans analizindeki pik noktaları, çevresel parazitlerden kaynaklanıyor olabilir.", "Sinyal gücü stabilizasyonu için PDF'indeki teknik notları kontrol et."]
    };

    function askAI() {
        const input = document.getElementById('ai-input');
        const content = document.getElementById('chat-content');
        const userMsg = input.value.toLowerCase();
        if(!userMsg) return;

        content.innerHTML += `<div style="color:var(--gold); margin-top:10px;"><b>Sen:</b> ${input.value}</div>`;
        
        setTimeout(() => {
            let response = "Bu konuda kütüphanendeki PDF'leri ve güncel analizleri tarıyorum. Daha spesifik bir detay ister misin?";
            
            // Basit bir anahtar kelime taraması ile doğru havuzdan cevap çekelim
            if(userMsg.includes("bonsai")) {
                response = aiHafiza.bonsai[Math.floor(Math.random() * aiHafiza.bonsai.length)];
            } else if(userMsg.includes("mimari") || userMsg.includes("çatı")) {
                response = aiHafiza.mimari[Math.floor(Math.random() * aiHafiza.mimari.length)];
            } else if(userMsg.includes("frekans") || userMsg.includes("sinyal")) {
                response = aiHafiza.frekans[Math.floor(Math.random() * aiHafiza.frekans.length)];
            }

            content.innerHTML += `<div style="margin-top:5px; border-left: 2px solid #333; padding-left: 10px;"><b>AI:</b> ${response}</div>`;
            content.scrollTop = content.scrollHeight;
        }, 800);
        
        input.value = "";
    }
</script>
