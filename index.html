<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş AI & Dünya Radyosu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d0d0d; --gold: #d4af37; --panel: #1a1a1a; --text: #f0f0f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }

        /* RADYO: EN ÜSTTE VE GÖZE ÇARPAN */
        .radio-master {
            background: linear-gradient(145deg, #1a1a1a, #252525);
            border: 2px solid var(--gold);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }
        .live-tag { color: #e74c3c; font-weight: bold; letter-spacing: 3px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        audio { width: 100%; margin-top: 25px; filter: invert(1) hue-rotate(180deg) brightness(1.5); }

        /* AKILLI SİNEMA TARAYICI */
        .ai-hub {
            background: var(--panel);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        .search-bar {
            width: 80%; padding: 15px; border-radius: 30px; border: 1px solid #444;
            background: #000; color: var(--gold); margin-bottom: 15px; outline: none;
        }
        .hub-btn {
            background: var(--gold); color: #000; border: none; padding: 10px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s;
        }
        .hub-btn:hover { background: #fff; transform: scale(1.05); }

        /* ALT PANEL: GRAFİK VE KÜTÜPHANE */
        .footer-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .card { background: var(--panel); border-radius: 20px; padding: 20px; border: 1px solid #222; }
        .lib-link {
            display: block; color: #888; text-decoration: none; padding: 10px 0;
            border-bottom: 1px solid #333; font-size: 14px;
        }
        .lib-link:hover { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <!-- RADYO: BURADA VE GÖRÜNÜR! -->
    <div class="radio-master">
        <span class="live-tag">● CANLI YAYIN AKTİF</span>
        <h1 style="margin: 10px 0; color: var(--gold);">Dünya Müziği Radyosu</h1>
        <p style="color: #666; font-size: 14px;">Kaş'taki çalışmalarına global tınılar eşlik etsin.</p>
        <audio controls autoplay>
            <source src="https://icecast.radiofrance.fr/fip-midfi.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- SİNEMA TARAYICI -->
    <div class="ai-hub">
        <h3 style="margin-top:0; font-weight: 300; letter-spacing: 2px;">AKILLI FİLM TARAYICI</h3>
        <input type="text" id="movieInp" class="search-bar" placeholder="Aratmak istediğin entellektüel filmi yaz...">
        <div>
            <button class="hub-btn" onclick="go('mubi')">MUBI</button>
            <button class="hub-btn" onclick="go('criterion')">Criterion</button>
            <button class="hub-btn" onclick="go('imdb')">IMDb</button>
        </div>
    </div>

    <div class="footer-grid">
        <!-- ISIL ANALİZ -->
        <div class="card" style="height: 180px;">
            <canvas id="weatherChart"></canvas>
        </div>
        <!-- TEKNİK KÜTÜPHANE -->
        <div class="card">
            <h4 style="margin:0 0 10px 0; color: var(--gold);">BİLGİ ÜSSÜ</h4>
            <a href="frekanslar.pdf" class="lib-link">📡 Frekans Analizi</a>
            <a href="bonsai_teknikleri.pdf" class="lib-link">🌳 Bonsai Sanatı</a>
            <a href="mimari_cizim.pdf" class="lib-link">📐 Mimari Eskizler</a>
        </div>
    </div>
</div>

<script>
    function go(p) {
        const q = document.getElementById('movieInp').value;
        if(!q) return alert('Film adı giriniz.');
        const urls = {
            mubi: `https://mubi.com/tr/search/films?query=${q}`,
            criterion: `https://www.criterion.com/search#stq=${q}`,
            imdb: `https://www.imdb.com/find?q=${q}&s=tt&ttype=ft`
        };
        window.open(urls[p], '_blank');
    }

    fetch('results.json').then(r => r.json()).then(d => {
        const ctx = document.getElementById('weatherChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: d.map(x => x.nokta),
                datasets: [{ data: d.map(x => x.deger), borderColor: '#d4af37', tension: 0.4, fill: false, pointRadius: 0 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    });
</script>

</body>
</html>
