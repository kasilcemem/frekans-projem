<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kaş Bilgi Üssü & Global Radyo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; letter-spacing: 1px; }

        /* RADYO KULESİ TASARIMI */
        .radio-station {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            margin: 30px 0;
            border-bottom: 5px solid #3498db;
        }
        .pulse {
            width: 12px; height: 12px; background: #e74c3c; border-radius: 50%;
            display: inline-block; margin-right: 10px; animation: flash 1.5s infinite;
        }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        audio { width: 100%; margin-top: 15px; border-radius: 10px; }

        /* GRAFİK VE KİTAPLIK */
        .chart-container { height: 250px; margin-bottom: 40px; }
        .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .book { 
            background: #34495e; color: white; padding: 15px; border-radius: 10px; 
            text-decoration: none; text-align: center; font-size: 14px; transition: 0.3s;
        }
        .book:hover { background: #3498db; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Kaş İstasyonu</h1>
        
        <!-- HAVA DURUMU -->
        <div class="chart-container"><canvas id="weatherChart"></canvas></div>

        <!-- DOĞRUDAN YAYIN YAPAN RADYO -->
        <div class="radio-section">
            <div class="radio-station">
                <div class="pulse"></div><strong>CANLI YAYIN: Dünya Müziği Frekansı</strong>
                <p style="font-size: 12px; color: #bdc3c7; margin-top: 5px;">Kesintisiz Global Chill & Etnik Seçkiler</p>
                <audio controls>
                    <!-- Bu link doğrudan bir radyo akışıdır (Stream), ücretsiz ve sınırsızdır. -->
                    <source src="https://n0a.radiojar.com/8s73a8m2adquv?1613511116" type="audio/mpeg">
                    Tarayıcın bu radyoyu desteklemiyor.
                </audio>
            </div>
        </div>

        <!-- KÜTÜPHANE -->
        <div class="library-section">
            <h2 style="font-size: 18px;">📚 Bilgi Kaynakları</h2>
            <div class="shelf">
                <a href="frekanslar.pdf" class="book">📡 Frekanslar</a>
                <a href="bonsai_teknikleri.pdf" class="book">🌳 Bonsai</a>
                <a href="mimari_cizim.pdf" class="book">📐 Mimari</a>
                <a href="python_notlar.pdf" class="book">🐍 Python</a>
            </div>
        </div>
    </div>

    <script>
        fetch('results.json')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('weatherChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.nokta),
                        datasets: [{
                            label: 'Sıcaklık (°C)',
                            data: data.map(d => d.deger),
                            backgroundColor: '#3498db',
                            borderRadius: 5
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            });
    </script>
</body>
</html>
