name: Python Calistir
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'  # Her gün Türkiye saatiyle 12:00 civarı otomatik çalışır

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Kutuphaneleri Yukle
        run: pip install requests
          
      - name: Veri Isleme ve Hava Durumu
        run: python data_process.py
        
      - name: Sonuclari Kaydet ve Yayinla
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add results.json
          git commit -m "Otomatik hava durumu guncellendi" || exit 0
          git push
